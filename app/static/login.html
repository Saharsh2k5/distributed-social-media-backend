<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | College Social Media Platform</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body data-page="login">
  <header class="hero">
    <h1>College Social Media Platform</h1>
    <p>Local API with secure session-based access</p>
  </header>

  <main class="single-column">
    <section class="card auth-card">
      <h2>Login</h2>
      <form id="login-form">
        <label>Email</label>
        <input type="email" id="email" required placeholder="rahul.sharma@iitgn.ac.in" />

        <label>Password</label>
        <input type="password" id="password" required placeholder="password123" />

        <button type="submit">Sign In</button>
      </form>
      <p class="status">Don't have an account? <a href="/static/signup.html">Sign up</a></p>
      <div id="auth-status" class="status"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
