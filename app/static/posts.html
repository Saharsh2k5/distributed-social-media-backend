<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Posts | College Social Media Platform</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body data-page="posts">
  <header class="topbar">
    <div class="brand">College Social Media Platform</div>
    <button id="menu-toggle" class="hamburger" aria-label="Open navigation">☰</button>
    <nav id="mobile-nav" class="mobile-nav hidden">
      <a href="/static/portfolio.html" class="nav-link">Portfolio</a>
      <a href="/static/search.html" class="nav-link">Search Members</a>
      <a href="/static/create-post.html" class="nav-link">Create Post</a>
      <a href="/static/posts.html" class="nav-link">Posts</a>
      <button id="logout-btn" class="nav-logout" type="button">Logout</button>
    </nav>
  </header>

  <main class="single-column">
    <section class="card">
      <h2>All Posts</h2>
      <p class="status">Use Create Post from the menu to add a new post.</p>
      <button id="refresh-posts" type="button">Refresh Posts</button>
      <div id="post-create-status" class="status"></div>
      <div id="post-list"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
